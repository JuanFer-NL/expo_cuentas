<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>expo_cuentas</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Capturar errores generales
      window.onerror = function(mensaje, url, linea, columna, error) {
        var errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'color: white; background-color: red; position: fixed; top: 0; left: 0; z-index: 9999; width: 100%; padding: 15px; font-size: 16px; font-family: sans-serif;';
        errorDiv.innerText = 'Error fatal: ' + mensaje + ' (Línea ' + linea + ')';
        document.body.appendChild(errorDiv);
        return false;
      };

      // Capturar promesas o fetches que fallen
      window.onunhandledrejection = function(evento) {
        var errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'color: white; background-color: orange; position: fixed; top: 60px; left: 0; z-index: 9999; width: 100%; padding: 15px; font-size: 16px; font-family: sans-serif;';
        errorDiv.innerText = 'Promesa fallida: ' + evento.reason;
        document.body.appendChild(errorDiv);
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
